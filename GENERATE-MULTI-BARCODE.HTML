}
</script>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Label Generator</title>

<!-- Material Design (MUI) -->
<link href="https://cdn.jsdelivr.net/npm/@mui/material@5.15.0/dist/material.min.css" rel="stylesheet">

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Roboto, Arial;
  margin: 0;
  background: #f5f5f5;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 16px;
}

textarea {
  width: 100%;
  height: 120px;
  padding: 10px;
  font-size: 14px;
}

button {
  padding: 10px 16px;
  margin: 8px 5px 8px 0;
  border: none;
  background: #1976d2;
  color: white;
  border-radius: 4px;
  cursor: pointer;
}

button:hover {
  background: #125ea7;
}

/* Label Grid */
#labels {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  background: white;
  padding: 10px;
}

.label {
  border: 1px solid #ddd;
  height: 100px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  font-size: 12px;
}

svg {
  width: 100%;
  height: 50px;
}

/* Print layout */
@media print {
  body * { visibility: hidden; }
  #labels, #labels * { visibility: visible; }
  #labels {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    gap: 5px;
  }
}
</style>
</head>

<body>

<div class="container">
  <h2>📦 Barcode Label Generator</h2>

  <textarea id="input" placeholder="Paste barcode list (one per line)..."></textarea>

  <br>
  <button onclick="generate()">Generate</button>
  <button onclick="downloadPDF()">Download PDF</button>
  <button onclick="window.print()">Print</button>

  <div id="labels"></div>
</div>

<script>
function generate() {
  const input = document.getElementById("input").value.trim();
  const lines = input.split("\n").filter(x => x.trim() !== "");
  const container = document.getElementById("labels");

  container.innerHTML = "";

  lines.forEach(text => {
    const div = document.createElement("div");
    div.className = "label";

    const label = document.createElement("div");
    label.innerText = text;

    const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");

    div.appendChild(svg);
    div.appendChild(label);
    container.appendChild(div);

    JsBarcode(svg, text, {
      format: "CODE128",
      width: 1.5,
      height: 40,
      displayValue: false
    });
  });
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p", "mm", "a4");

  const labels = document.getElementById("labels");

  const canvas = await html2canvas(labels, {
    scale: 2
  });

  const imgData = canvas.toDataURL("image/png");

  const pageWidth = 210;
  const pageHeight = 297;

  pdf.addImage(imgData, "PNG", 0, 0, pageWidth, pageHeight);
  pdf.save("barcodes.pdf");
}
</script>

</body>
</html>
