<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<style>
  body {
    margin: 0;
    font-family: "Roboto", Arial;
    background: linear-gradient(135deg, #1976d2, #42a5f5);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 12px;
    width: 300px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    text-align: center;
  }

  input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    font-size: 16px;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #1976d2;
    color: white;
    border: none;
    cursor: pointer;
  }

  button:hover {
    background: #125aa0;
  }
</style>
</head>

<body>

<div class="card">
  <h2>Warehouse Login</h2>

  <input id="user" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
function login() {
  const u = document.getElementById('user').value;
  const p = document.getElementById('pass').value;

  // SIMPLE LOGIN (you can replace with API later)
  if (u === "admin" && p === "1234") {
    localStorage.setItem("auth", "true");
    window.location.href = "index.html";
  } else {
    alert("Invalid login");
  }
}
</script>

</body>
</html>
