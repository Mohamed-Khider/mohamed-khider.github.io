<script>
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Warehouse System</title>

<!-- Google Material Icons -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=logout" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=barcode" />
<style>
  body {
    margin: 0;
    font-family: "Roboto", Arial;
    background: #f5f7fa;
  }

  header {
    background: #1976d2;
    color: white;
    padding: 20px;
    font-size: 22px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .container {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 50px;
    flex-wrap: wrap;
  }

  .card {
    width: 250px;
    background: white;
    border-radius: 12px;
    padding: 30px;
    text-align: center;
    cursor: pointer;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.2);
  }

  .material-icons {
    font-size: 59px;
    color: #1976d2;
    margin-bottom: 10px;
  }


.material-symbols-outlined {
  font-variation-settings:
  'FILL' FFFFFF,
  'wght' 1000,
  'GRAD' 1200,
  'opsz' 77;
  font-size: 70;
}


  .title {
    font-size: 18px;
    font-weight: bold;
  }
</style>
</head>

<body>

<header>Warehouse Label System</header>

<div class="container">

  <div class="card" onclick="goTo('pallet.html')">
    <span class="material-icons">inventory</span>
    <div class="title">Pallet Labels</div>
  </div>

  <div class="card" onclick="goTo('section.html')">
    <span class="material-icons">grid_view</span>
    <div class="title">Section Labels</div>
  </div>

    <div class="card" onclick="goTo('GENERATE-MULTI-BARCODE.html')">
      <span class="material-symbols-outlined">barcode</span>
    <div class="title">MULTI BARCODE LABEL GENERATOR</div>
  </div>

      <div class="card" onclick="goTo(' GENERATE-BARCODE.html')">
     <span class="material-symbols-outlined">barcode</span>
    <div class="title">SINGLE BARCODE GENERATOR</div>
  </div>


  <div class="card" onclick="goTo('login.html')">
<span class="material-icons">
logout
</span>
    <div class="title">logout</div>
  </div>

<script>
function logout() {
  localStorage.removeItem("auth");
  window.location.href = "login.html";
}
</script>


</div>

<script>
  function goTo(page) {
    window.location.href = page;
  }
</script>

</body>
</html>
