<script>
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "index.html";
}
</script>


<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Warehouse Label Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

<style>
body {
  font-family: 'Roboto', sans-serif;
  background: #f2f4f8;
  margin: 0;
  padding: 24px;
  color: #2f3e4f;
}

.container {
  max-width: 1120px;
  margin: auto;
}

h2 {
  text-align: center;
  margin-bottom: 24px;
  font-weight: 600;
  letter-spacing: 0.02em;
  color: #0f5fc0;
}

h3 {
  font-weight: 600;
  margin-bottom: 16px;
  color: #344054;
}

.card {
  background: #fff;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
  margin-bottom: 24px;
}

.row {
  display: flex;
  flex-wrap: wrap;
  gap: 16px;
  align-items: center;
}

input, select {
  flex: 1 1 180px;
  min-width: 180px;
  padding: 14px 16px;
  font-size: 15px;
  border: 1px solid #d1d5db;
  border-radius: 10px;
  font-family: 'Roboto', sans-serif;
  background: #f8fafc;
}

input:focus, select:focus {
  outline: none;
  border-color: #0f5fc0;
  box-shadow: 0 0 0 3px rgba(15, 95, 192, 0.12);
}

button {
  background: #0f5fc0;
  color: white;
  border: none;
  padding: 14px 26px;
  border-radius: 10px;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  font-weight: 600;
  letter-spacing: 0.01em;
  box-shadow: 0 10px 20px rgba(15, 95, 192, 0.15);
  transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

button:hover {
  background: #0a4e9e;
  transform: translateY(-1px);
  box-shadow: 0 12px 24px rgba(15, 95, 192, 0.2);
}

button:active {
  transform: translateY(0);
}

.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 14px;
  justify-content: space-between;
}

.actions button {
  min-width: 140px;
}

.preview-section {
  display: flex;
  gap: 24px;
  align-items: flex-start;
  flex-wrap: wrap;
}

.preview-pane,
.code-pane {
  flex: 1 1 450px;
  min-width: 320px;
}

.preview-pane {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.code-pane {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.preview-panel,
.code-panel {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  padding: 18px;
  min-height: 640px;
}

#zplOut {
  width: 100%;
  height: 100%;
  min-height: 560px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.5;
  border: 1px solid #cbd5e1;
  border-radius: 10px;
  padding: 16px;
  resize: none;
  background: #f3f4f6;
  color: #1f2937;
}

/* ZEBRA CANVAS (203 DPI) */
#printArea {
  position: relative;
  width: 812px;   /* 4 inch * 203 dpi */
  height: 1218px; /* 6 inch * 203 dpi */
  background: #fff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(15, 23, 42, 0.08);
}

.print-preview-wrapper {
  width: 406px;
  height: 609px;
  overflow: hidden;
  border-radius: 12px;
  border: 2px solid #0f5fc0;
  background: #ffffff;
  box-shadow: 0 15px 35px rgba(15, 95, 192, 0.15);
}

#printArea {
  transform: scale(0.5);
  transform-origin: top left;
}

/* Barcode block */
.zebra-item {
  position: absolute;
  left: 100px;
  width: 600px;
  border-radius: 10px;
  background: #ffffff;
  padding: 12px;
  border: 2px solid #0f5fc0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.zebra-item svg {
  display: block;
  margin: 0 auto;
  text-align: center;
}

/* Right label */
.side-text {
  position: absolute;
  left: 710px;
  width: 100px;
  text-align: center;
  font-size: 32px;
  font-weight: 700;
  font-family: 'Arial Black', sans-serif;
  border-radius: 10px;
  padding: 12px 8px;
  background: #ffffff;
  border: 2px solid #0f5fc0;
  color: #0f5fc0;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1.2;
}

/* PRINT */
@media print {

  @page {
    size: 4in 6in;
    margin: 0;
  }

  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    top: 0;
    left: 0;
    border: none;
    box-shadow: none;
    transform: none;
  }

  #printArea .zebra-item, #printArea .side-text {
    border: none;
    background: none;
    padding: 0;
    display: block;
  }

  #printArea .zebra-item svg {
    margin: 0;
  }

}
</style>
</head>

<body>

<script>
if (localStorage.getItem("auth") !== "true") {
  window.location.href = "login.html";
}
</script>

<div class="container">
  <h2>Warehouse Label Generator</h2>

  <div class="card">
    <div class="actions">
      <div class="row" style="flex:1; gap: 12px;">
        <input id="cInput" placeholder="C (e.g. 07)">
        <input id="sInput" placeholder="S (e.g. 01)">
        <select id="levelSelect">
          <option value="">Level</option>
          <option value="1">L1</option>
          <option value="2">L2</option>
          <option value="3">L3</option>
          <option value="4">L4</option>
        </select>
      </div>
      <button onclick="generate()">Generate</button>
      <button onclick="window.print()">Print Label</button>
    </div>
  </div>

  <div class="card">
    <div class="preview-section">
      <div class="preview-pane">
        <h3>Barcode Preview</h3>
        <div class="preview-panel">
          <div class="print-preview-wrapper">
            <div id="printArea"></div>
          </div>
        </div>
      </div>
      <div class="code-pane">
        <h3>ZPL Code</h3>
        <div class="code-panel">
          <textarea id="zplOut"></textarea>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const suffixes = ['A','B','C','D','E']; // match your ZPL

function generate() {
  const c = document.getElementById('cInput').value.trim().toUpperCase();
  const s = document.getElementById('sInput').value.trim().toUpperCase();
  const levelNum = document.getElementById('levelSelect').value;

  if (!c || !s || !levelNum) {
    alert("All fields required");
    return;
  }

  const base = `RML-${c}-${s}`;
  const levels = suffixes.map(x => `L${levelNum}${x}`);

  render(base, levels);
  generateZPL(base, levels);
}

function render(base, levels) {
  const container = document.getElementById('printArea');
  container.innerHTML = "";

  let y = 60;

  levels.forEach(level => {
    const code = `${base}-${level}`;

    // Barcode
    const wrap = document.createElement("div");
    wrap.className = "zebra-item";
    wrap.style.top = y + "px";

    const svg = document.createElementNS("http://www.w3.org/2000/svg","svg");

    JsBarcode(svg, code, {
      format: "CODE128",
      width: 3,        // matches ^BY3
      height: 100,
      displayValue: true,
      fontSize: 24,
      margin: 0
    });

    wrap.appendChild(svg);

    // Side text
    const side = document.createElement("div");
    side.className = "side-text";
    side.style.top = (y + 100) + "px";
    side.innerText = level;

    container.appendChild(wrap);
    container.appendChild(side);

    y += 200; // exact ZPL spacing
  });
}

function generateZPL(base, levels) {
  let y = 60;

  let zpl = `^XA
^PW812
^LL1218
^BY3,2,120
`;

  levels.forEach(level => {
    zpl += `
^FO100,${y}
^BCN,120,Y,N,N
^FD${base}-${level}^FS

^FO710,${y + 100}
^A0N,60,60
^FD${level}^FS
`;
    y += 200;
  });

  zpl += "\n^XZ";

  document.getElementById("zplOut").value = zpl;
}
</script>

</body>
</html>
